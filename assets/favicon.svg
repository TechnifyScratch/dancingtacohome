      <rect x="6" y="6" width="52" height="52" rx="16" />
    </clipPath>
  </defs>

  <rect x="6" y="6" width="52" height="52" rx="16" fill="#ffffff" stroke="rgba(15,23,42,0.14)" />

  <g clip-path="url(#clip)">
    <image href="logo.png" x="6" y="6" width="52" height="52" preserveAspectRatio="xMidYMid slice" />
  </g>
</svg>
